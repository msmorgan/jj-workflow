# Copy to jjworkflow.toml in your repo root and edit. All keys are optional.

# Executable run after a new workspace is created, with the workspace dir as $1.
# Use it to symlink shared/gitignored dirs and generate build inputs the new
# workspace needs. Default: scripts/provision-workspace
provision_hook = "scripts/provision-workspace"

# Directory that holds feature workspaces. Relative paths resolve against the
# repo root; absolute paths are used as-is. If it points INSIDE the repo (e.g.
# ".claude/worktrees"), gitignore that directory — otherwise jj snapshots every
# child workspace into the coordinator's working copy. Default: Codex plugin
# uses ".codex/workspaces" to remain inside its sandbox's writable repo root;
# other installs use ".." (siblings of the repo dir). Omit this key to keep
# that host-aware default; uncomment and edit it only to override.
# workspace_dir = ".custom/workspaces"

# Project ticket/census tool `claim` consults for unknown names: must support
# `<todo_cmd> iscensus SLUG` (exit 0 iff SLUG is mintable) and
# `<todo_cmd> mint SLUG` (print a wip ticket file). Relative paths resolve
# against the repo root. Missing/non-executable → census minting is simply off.
# Default: scripts/todo
todo_cmd = "scripts/todo"
