# Copy to jjworkflow.toml in your repo root and edit. All keys are optional.

# Executable run after a new workspace is created, with the workspace dir as $1.
# Use it to symlink shared/gitignored dirs and generate build inputs the new
# workspace needs. Default: scripts/provision-workspace
provision_hook = "scripts/provision-workspace"

# Directory that holds feature workspaces and the .integrated/.abandoned archive
# buckets. Relative paths resolve against the repo root; absolute paths are used
# as-is. If it points INSIDE the repo (e.g. ".claude/worktrees"), gitignore that
# directory — otherwise jj snapshots every child workspace into the
# coordinator's working copy. Default: ".." (siblings of the repo dir)
workspace_dir = ".."
